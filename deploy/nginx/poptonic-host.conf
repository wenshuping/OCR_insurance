# Dedicated host nginx ingress for the OCR insurance app.
# This intentionally does not include app.joyhive.cn, work.joyhive.cn, or console.joyhive.cn.
#
# Install on the ECS host, for example:
#   sudo cp deploy/nginx/poptonic-host.conf /etc/nginx/conf.d/poptonic-ocr.conf
#   sudo nginx -t && sudo systemctl reload nginx

map $http_x_forwarded_proto $poptonic_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 80;
  server_name poptonic.cn www.poptonic.cn app.poptonic.cn;

  client_max_body_size 80m;

  location / {
    proxy_pass http://127.0.0.1:5601;
    proxy_http_version 1.1;
    proxy_read_timeout 180s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $poptonic_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
